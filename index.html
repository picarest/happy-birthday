<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/cakeFavicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta property="og:title" content="Happy Birthday Orihime" />
    <meta property="og:description" content="A cute little website made with love - Wishing you the happiest birthday" />
    <meta property="og:image" content="https://happy-birthday-murex-pi.vercel.app/deskBanner.png" />
    <meta property="og:url" content="https://happy-birthday-murex-pi.vercel.app/" />
    <meta property="og:type" content="website" />

    <!-- For Twitter too -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Birthday Orihime" />
    <meta name="twitter:description" content="A cute little website made with love - Wishing you the happiest birthday" />
    <meta name="twitter:image" content="https://happy-birthday-murex-pi.vercel.app/deskBanner.png" />
    <title>Happy Birthday</title>
  </head>
  <body>
    <div id="root"></div>

    <!-- ব্যাকগ্রাউন্ড মিউজিক ট্যাগ (এটি লুপে চলবে) -->
    <audio id="bg-music" loop>
      <source src="/audio.mp3" type="audio/mpeg">
      Your browser does not support the audio element.
    </audio>

    <!-- মিউজিক অটো-প্লে করার স্ক্রিপ্ট -->
    <script>
      window.addEventListener('click', () => {
        const music = document.getElementById('bg-music');
        if (music.paused) {
          music.play().catch(error => console.log("Autoplay blocked or failed:", error));
        }
      }, { once: true }); // 'once: true' দেওয়াতে প্রথম ক্লিকের পরই শুধু এটি কাজ করবে, বারবার ডিস্টার্ব করবে না।
    </script>

    <script type="module" src="/src/main.jsx"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.4.0/dist/confetti.browser.min.js"></script>
  </body>
</html>
